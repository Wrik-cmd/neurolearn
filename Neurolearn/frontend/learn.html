<div class="flex flex-1 overflow-hidden relative">
  <!-- TOC Sidebar -->
  <aside class="hidden lg:flex w-72 flex-col bg-surface-container-low border-r border-white/5 h-[calc(100vh-73px)] sticky top-[73px] overflow-y-auto custom-scrollbar anim-slide-right">
    <div class="p-6">
      <h3 class="font-headline text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-4">Table of Contents</h3>
      <nav id="toc-list" class="space-y-1">
        <button onclick="document.getElementById('intro').scrollIntoView({behavior:'smooth'})" class="w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 bg-primary/10 border border-primary/20 text-primary transition-all group">
          <div class="w-3 h-3 rounded-full border-[1.5px] border-primary group-hover:bg-primary/30 transition-colors"></div>
          <span class="text-sm font-medium">Introduction</span>
        </button>
        <button onclick="document.getElementById('concept').scrollIntoView({behavior:'smooth'})" class="w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-slate-400 hover:text-white hover:bg-white/5 transition-all group mt-1 mt-1">
          <div class="w-3 h-3 rounded-full border-[1.5px] border-slate-600 group-hover:border-slate-400 transition-colors"></div>

  <!-- Main Content -->

          <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-tertiary/10 text-tertiary border border-tertiary/20">Core Logic</span>
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span> 12 min read</span>
        </div>

      <!-- Content Container -->

<!-- Background Decor -->
<div class="fixed top-1/4 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[120px] -z-10 pointer-events-none anim-float"></div>
<div class="fixed bottom-1/4 -right-20 w-[30rem] h-[30rem] bg-secondary/5 rounded-full blur-[150px] -z-10 pointer-events-none anim-float delay-500"></div>

<script src="js/api.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const courseId = urlParams.get('courseId');
  const topicId = urlParams.get('topicId');
  const course = urlParams.get('course') || 'Course Overview';
  const topic = urlParams.get('topic') || 'Learning Module';

  document.getElementById('breadcrumb-course').textContent = course;
  document.getElementById('lesson-topic').textContent = topic;
  document.getElementById('lesson-name').textContent = topic;

  async function loadContent() {
    if (!courseId) {
      document.getElementById('content-block').innerHTML = '<div class="text-center py-10"><h2 class="text-error mb-2">Matrix Access Denied</h2><p class="text-slate-400 mb-6">No specific course node was provided.</p><a href="course.html" class="px-6 py-3 rounded-xl bg-surface-bright text-white font-bold tracking-wide hover:bg-primary hover:text-on-primary transition-all">Return to Courses</a></div>';
      return;
    }

    try {
      const res = await API.courses.getTopics(courseId);
      if (res.success && res.data) {
        const t = res.data.find(x => (topicId && x._id === topicId) || x.title === topic);
        if (t) {
          document.getElementById('content-block').innerHTML = `
            <section id="intro" class="relative z-10">
              <h2>Module Overview</h2>
              <p class="text-lg text-slate-300 leading-relaxed font-light">${t.description}</p>
            </section>
            
            <div class="w-full h-px bg-white/10 my-10 relative z-10"></div>
            
            <section id="concept" class="relative z-10">
              <h2>Logic Architecture</h2>
              <div class="prose prose-invert max-w-none prose-p:text-slate-300 prose-p:leading-relaxed prose-headings:font-headline prose-headings:text-primary">
                ${t.content}
              </div>
            </section>
            
            <div class="mt-16 pt-8 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-4 relative z-10">
              <a href="course.html" class="px-6 py-3 rounded-xl border border-white/10 text-white font-bold tracking-wide hover:bg-white/5 transition-all text-sm w-full md:w-auto text-center">← Return to Catalog</a>
              <a href="quiz.html?topic=${encodeURIComponent(topic)}" class="px-6 py-3 rounded-xl bg-gradient-to-r from-primary to-secondary text-[#0f141b] font-bold tracking-wide shadow-[0_0_15px_rgba(60,215,255,0.3)] hover:opacity-90 transition-all text-sm w-full md:w-auto text-center">Initialize Assessment →</a>
            </div>
          `;
        } else {
          document.getElementById('content-block').innerHTML = '<div class="text-error font-bold p-10 text-center">Topic data missing from the neural DB.</div>';
        }
      }
    } catch (err) {
      document.getElementById('content-block').innerHTML = '<div class="text-error font-bold p-10 text-center">Failed to establish connection to neural DB.</div>';
    }
  }

  loadContent();
</script>

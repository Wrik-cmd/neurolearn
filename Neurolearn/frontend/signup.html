<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeuroLearn - Register Pipeline</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#99f7ff",
              "secondary": "#6e9bff",
              "tertiary": "#cb7bff",
              "error": "#ffb4ab",
              "surface": "#090e15",
              "surface-container": "#141a23",
              "surface-container-highest": "#1f2631",
              "surface-container-low": "#0e141c",
              "surface-container-lowest": "#000000",
              "background": "#090e15",
              "on-surface": "#edf1fb",
              "on-surface-variant": "#a7abb5",
              "on-background": "#edf1fb",
              "outline": "#71767f",
              "outline-variant": "#434851",
              "on-primary-container": "#00555a",
              "secondary-container": "#0058ca"
            },
            fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; min-height: 100vh; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .neural-glow { filter: blur(80px); opacity: 0.4; }
        .glass-card { background: rgba(31, 38, 49, 0.4); backdrop-filter: blur(20px); }
        .ghost-border { outline: 1px solid rgba(113, 118, 127, 0.15); }
        .ghost-border:focus-within { outline: 1px solid rgba(153, 247, 255, 0.5); box-shadow: 0 0 15px rgba(153, 247, 255, 0.1); }
        .auth-error { display: none; background: rgba(255,113,108,0.1); border: 1px solid rgba(255,113,108,0.3); color: #ff716c; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.8rem; margin-bottom: 1rem; }
    </style>
<link rel="stylesheet" href="css/animations.css" />
</head>
<body class="bg-background text-on-surface selection:bg-primary/30 min-h-screen overflow-x-hidden anim-bg-pan">
<header class="fixed top-0 left-0 w-full z-50 bg-[#090e15]/60 backdrop-blur-[20px] shadow-none after:absolute after:bottom-0 after:left-0 after:w-full after:h-[1px] after:bg-[#99f7ff]/10">
<div class="flex justify-between items-center px-8 h-[76px] max-w-7xl mx-auto w-full">
<a href="index.html" class="flex items-center gap-2 w-48 md:w-64">
<span class="material-symbols-outlined text-[#99f7ff] text-2xl">psychology</span>
<span class="text-2xl font-bold tracking-tighter text-[#99f7ff] drop-shadow-[0_0_8px_rgba(153,247,255,0.5)]">NeuroLearn</span>
</a>
<nav class="hidden md:flex items-center justify-center gap-8 text-sm font-['Inter'] font-medium flex-1">
<a class="text-slate-400 hover:text-[#99f7ff] transition-all" href="index.html">Home</a>
<a class="text-slate-400 hover:text-[#99f7ff] transition-all" href="course.html">Courses</a>
</nav>
<div class="w-48 md:w-64"></div>
</div>
</header>
<main class="min-h-screen flex flex-col md:flex-row pt-16 md:pt-0">
<section class="relative w-full md:w-1/2 min-h-[353px] md:min-h-screen flex flex-col items-center justify-center overflow-hidden px-8 py-20 hidden md:flex">
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary neural-glow rounded-full anim-float"></div>
<div class="absolute bottom-1/4 -right-20 w-[30rem] h-[30rem] bg-tertiary neural-glow rounded-full anim-float delay-500"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-gradient-to-tr from-background via-transparent to-transparent z-10"></div>
<div class="relative z-20 flex flex-col items-center text-center max-w-md anim-slide-right">
<div class="mb-8 relative group">
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full scale-110"></div>
<div class="relative w-32 h-32 glass-card rounded-xl flex items-center justify-center border border-primary/10 shadow-2xl overflow-hidden">
<span class="material-symbols-outlined absolute text-5xl text-primary drop-shadow-[0_0_15px_rgba(153,247,255,0.8)]">neurology</span>
</div>
</div>
<h2 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-on-surface mb-6 leading-tight">
                    Join the <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-tertiary">Hive</span>
</h2>
<p class="text-lg text-on-surface-variant font-medium leading-relaxed tracking-wide">
                    Initialize your personalized neural learning matrix.
                </p>
</div>
</section>
<section class="w-full md:w-1/2 flex items-center justify-center bg-surface p-6 md:p-12 lg:p-24 relative">
<div class="absolute inset-0 bg-gradient-to-bl from-surface-container-low to-background pointer-events-none"></div>
<div class="relative w-full max-w-md z-10 anim-slide-left">
<div class="glass-card p-8 md:p-10 rounded-lg shadow-2xl border border-white/5">
<div class="mb-10 text-center md:text-left">
<h1 class="text-3xl font-bold tracking-tight text-on-surface mb-2">Create Account</h1>
<p class="text-on-surface-variant text-sm tracking-wide">Establish your credentials to begin adaptation.</p>
</div>
<form id="signup-form" class="space-y-6" novalidate>
<div id="signup-error" class="auth-error"></div>
<div class="space-y-2 anim-fade-up delay-200">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="signup-name">Full Name</label>
<div class="ghost-border group flex items-center bg-surface-container-lowest rounded-full px-5 py-3.5 transition-all">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors mr-3 text-xl">person</span>
<input class="bg-transparent border-none outline-none focus:ring-0 w-full text-on-surface text-sm font-medium" id="signup-name" name="name" placeholder="Alex Chen" type="text" required/>
</div>
</div>
<div class="space-y-2 anim-fade-up delay-300">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="signup-email">Neural Identity (Email)</label>
<div class="ghost-border group flex items-center bg-surface-container-lowest rounded-full px-5 py-3.5 transition-all">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors mr-3 text-xl">alternate_email</span>
<input class="bg-transparent border-none outline-none focus:ring-0 w-full text-on-surface text-sm font-medium" id="signup-email" name="email" placeholder="email@neurolearn.io" type="email" required/>
</div>
</div>
<div class="space-y-2 anim-fade-up delay-400">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="signup-password">Access Key</label>
<div class="ghost-border group flex items-center bg-surface-container-lowest rounded-full px-5 py-3.5 transition-all">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors mr-3 text-xl">lock</span>
<input class="bg-transparent border-none outline-none focus:ring-0 w-full text-on-surface text-sm font-medium" id="signup-password" name="password" placeholder="••••••••••••" type="password" required/>
</div>
</div>
<button id="signup-btn" type="submit" class="w-full bg-gradient-to-r from-primary to-secondary-container text-on-primary-container font-bold tracking-tight py-4 rounded-full shadow-[0_8px_30px_rgb(0,241,254,0.15)] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group anim-fade-up delay-500 anim-pulse-glow">
                            INITIALIZE MATRIX <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant font-medium">
Already an active node? <a class="text-primary hover:underline underline-offset-4 ml-1" href="login.html">Sign in here</a>
</p>
</div>
</div>
</div>
</section>
</main>
<script src="js/api.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — NeuroLearn</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      z-index: 1;
    }
    .auth-visual {
      background: linear-gradient(135deg, rgba(180,79,255,0.06), rgba(0,245,255,0.06));
      border-right: 1px solid var(--border-glow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
      position: relative;
      overflow: hidden;
    }
    .auth-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 60% 40%, rgba(180,79,255,0.1), transparent 60%);
      pointer-events: none;
    }
    .auth-visual-logo {
      font-family: var(--font-display);
      font-size: 2.5rem; font-weight: 900;
      letter-spacing: 0.1em; color: var(--neon-purple);
      text-shadow: 0 0 30px rgba(180,79,255,0.5);
      margin-bottom: 2.5rem;
    }
    .benefits-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
    .benefits-list li {
      display: flex; align-items: center; gap: 0.75rem;
      color: var(--text-primary); font-size: 0.95rem;
      animation: fadeInUp 0.5s ease both;
    }
    .benefits-list li:nth-child(1) { animation-delay: 0.1s; }
    .benefits-list li:nth-child(2) { animation-delay: 0.2s; }
    .benefits-list li:nth-child(3) { animation-delay: 0.3s; }
    .benefits-list li:nth-child(4) { animation-delay: 0.4s; }
    .benefit-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(180,79,255,0.15);
      border: 1px solid rgba(180,79,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }

    .auth-form-panel {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4rem 3rem; overflow-y: auto;
    }
    .auth-form-wrap { width: 100%; max-width: 420px; }
    .auth-form-title {
      font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 700;
      letter-spacing: 0.05em; margin-bottom: 0.4rem;
      animation: fadeInUp 0.5s ease both;
    }
    .auth-form-subtitle {
      color: var(--text-muted); font-size: 0.88rem;
      margin-bottom: 2rem; animation: fadeInUp 0.5s 0.05s ease both;
    }
    .auth-form-subtitle a { color: var(--neon-cyan); text-decoration: none; }
    .auth-form { display: flex; flex-direction: column; gap: 1.1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .input-with-icon { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
    .input-with-icon input { padding-left: 2.75rem !important; }
    .input-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1rem; color: var(--text-muted); }
    .auth-error {
      background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.3);
      border-radius: 6px; padding: 0.75rem 1rem; font-size: 0.82rem; color: #ff4466; display: none;
    }
    .strength-row { display: flex; align-items: center; gap: 0.5rem; margin-top: -0.5rem; }
    .strength-bars { display: flex; gap: 3px; flex: 1; }
    .strength-bar { height: 3px; flex: 1; border-radius: 2px; background: rgba(255,255,255,0.08); transition: background 0.3s ease; }
    #password-strength { font-size: 0.72rem; min-width: 70px; transition: color 0.3s; }
    .terms-check { display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.82rem; color: var(--text-muted); cursor: pointer; }
    .terms-check input[type="checkbox"] { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--neon-cyan); flex-shrink: 0; }
    .terms-check a { color: var(--neon-cyan); text-decoration: none; }
    .btn-full { width: 100%; justify-content: center; }
    @keyframes inputShake {
      0%, 100% { border-color: #ff4466; }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .input-shake { animation: inputShake 0.4s ease !important; }
    @media (max-width: 768px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-visual { display: none; }
      .auth-form-panel { padding: 6rem 1.5rem 2rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="scan-lines"></div>

  <header>
    <nav>
      <a href="index.html" class="nav-logo">NEUROLEARN</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="course.html">Courses</a></li>
      </ul>
      <div class="nav-cta">
        <a href="login.html" class="btn btn-outline btn-sm">Login</a>
      </div>
    </nav>
  </header>

  <div class="auth-page" style="padding-top:64px;">

    <!-- LEFT VISUAL -->
    <div class="auth-visual">
      <div class="auth-visual-logo">NEUROLEARN</div>
      <ul class="benefits-list">
        <li><div class="benefit-icon">🎯</div> AI-personalized learning path</li>
        <li><div class="benefit-icon">📊</div> Deep performance analytics</li>
        <li><div class="benefit-icon">🏆</div> XP, badges & leaderboards</li>
        <li><div class="benefit-icon">⚡</div> 2000+ adaptive quiz questions</li>
      </ul>
    </div>

    <!-- RIGHT FORM -->
    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <h1 class="auth-form-title">Create Account</h1>
        <p class="auth-form-subtitle">
          Already have one? <a href="login.html">Sign in here →</a>
        </p>

        <form id="signup-form" class="auth-form" novalidate>
          <div id="signup-error" class="auth-error"></div>

          <div class="form-group fade-in-up delay-1">
            <label for="signup-name">Full Name</label>
            <div class="input-with-icon">
              <span class="input-icon">👤</span>
              <input type="text" id="signup-name" name="name"
                     placeholder="Your full name" autocomplete="name" required />
            </div>
          </div>

          <div class="form-group fade-in-up delay-2">
            <label for="signup-email">Email Address</label>
            <div class="input-with-icon">
              <span class="input-icon">✉️</span>
              <input type="email" id="signup-email" name="email"
                     placeholder="you@example.com" autocomplete="email" required />
            </div>
          </div>

          <div class="form-group fade-in-up delay-3">
            <label for="signup-password">Password</label>
            <div class="input-with-icon">
              <span class="input-icon">🔒</span>
              <input type="password" id="signup-password" name="password"
                     placeholder="At least 8 characters" autocomplete="new-password" required />
              <button type="button" class="input-toggle toggle-password" data-target="signup-password">👁️</button>
            </div>
          </div>

          <div class="strength-row fade-in-up delay-3">
            <div class="strength-bars" id="strength-bars">
              <div class="strength-bar" id="sb1"></div>
              <div class="strength-bar" id="sb2"></div>
              <div class="strength-bar" id="sb3"></div>
              <div class="strength-bar" id="sb4"></div>
              <div class="strength-bar" id="sb5"></div>
            </div>
            <span id="password-strength"></span>
          </div>

          <div class="form-group fade-in-up delay-4">
            <label for="signup-confirm">Confirm Password</label>
            <div class="input-with-icon">
              <span class="input-icon">🔒</span>
              <input type="password" id="signup-confirm" name="confirm"
                     placeholder="Repeat your password" autocomplete="new-password" required />
              <button type="button" class="input-toggle toggle-password" data-target="signup-confirm">👁️</button>
            </div>
          </div>

          <label class="terms-check fade-in-up delay-5">
            <input type="checkbox" id="terms-check" required />
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
          </label>

          <button type="submit" id="signup-btn" class="btn btn-purple btn-full btn-lg fade-in-up delay-6">
            CREATE MY ACCOUNT →
          </button>
        </form>
      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Live strength bars
    document.getElementById('signup-password')?.addEventListener('input', function() {
      const val = this.value;
      const bars = ['sb1','sb2','sb3','sb4','sb5'];
      const colors = ['#ff4466','#ff6b35','#ffd700','var(--neon-cyan)','var(--neon-green)'];
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      bars.forEach((id, i) => {
        const el = document.getElementById(id);
        if (el) el.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.08)';
      });
    });
  </script>
</body>
</html>
